<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-primary navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">ScoobySocial</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                ☰
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="perfil.html">Perfil</a></li>
                    <li class="nav-item"><a class="nav-link" href="configuracao.html">Configuração</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                </ul>

                <!-- botão dark mode -->
                <button onclick="toggleTheme()" class="btn btn-light ms-3">🌙</button>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO -->
    <div class="container mt-5">

        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card text-center p-4 shadow">

                    <img src="scooby.png"
                        class="rounded-circle mx-auto mb-3"
                        width="150"
                        height="150"
                        style="object-fit: cover;">

                    <h3>Scooby-Doo</h3>

                    <p class="text-muted">Cachorro medroso mas gente boa</p>

                    <hr>

                    <p><strong>Bio:</strong> Amo biscoitos e fugir de fantasmas</p>

                    <p><strong>Interesses:</strong> Comida, aventura</p>

                    <a href="configuracao.html" class="btn btn-outline-primary mt-2">
                        Editar Perfil
                    </a>

                </div>

            </div>
        </div>

    </div>

    <!-- SCRIPT -->
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const atual = html.getAttribute("data-bs-theme");

            html.setAttribute("data-bs-theme", atual === "light" ? "dark" : "light");
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
