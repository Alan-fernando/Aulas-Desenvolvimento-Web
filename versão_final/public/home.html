<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scooby Social</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-primary navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">ScoobySocial</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                ☰
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="perfil.html">Perfil</a></li>
                    <li class="nav-item"><a class="nav-link" href="configuracao.html">Configuração</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                </ul>

                <!-- botão dark mode -->
                <button onclick="toggleTheme()" class="btn btn-light ms-3">🌙</button>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO -->
    <div class="container mt-4">

        <div class="row">

            <!-- PERFIL -->
            <div class="col-md-4">
                <div class="card">
                    <img src="scooby.png" class="card-img-top">
                    <div class="card-body text-center">
                        <h5>Scooby-Doo</h5>
                        <p>Cachorro medroso mas gente boa</p>
                    </div>
                </div>
            </div>

            <!-- FEED -->
            <div class="col-md-8">

                <!-- FORM -->
                <div class="card mb-3 shadow-sm">
                    <div class="card-body">
                        <form id="formulario">
                            <input type="text" id="nome" class="form-control mb-2" placeholder="Seu nome">
                            <textarea id="mensagem" class="form-control mb-2"
                                placeholder="O que você está pensando?"></textarea>
                            <button class="btn btn-primary w-100">Postar</button>
                        </form>
                    </div>
                </div>

                <!-- FEED -->
                <div id="listaComentarios">

                    <!-- exemplo fixo -->
                    <div class="card mb-2 shadow-sm">
                        <div class="card-body">
                            <strong>Salsicha</strong>
                            <p>Scooby cadê você meu filho!</p>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- SCRIPT -->
    <script>
        const form = document.getElementById("formulario");
        const lista = document.getElementById("listaComentarios");

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            const nome = document.getElementById("nome").value;
            const mensagem = document.getElementById("mensagem").value;

            const div = document.createElement("div");
            div.className = "card mb-2";

            div.innerHTML = `
                <div class="card-body">
                    <strong>${nome}</strong>
                    <p>${mensagem}</p>
                </div>
            `;

            lista.prepend(div);

            form.reset();
        });

        function toggleTheme() {
            const html = document.documentElement;
            const atual = html.getAttribute("data-bs-theme");

            html.setAttribute("data-bs-theme", atual === "light" ? "dark" : "light");
        }
    </script>

</body>

</html>
