<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-primary navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">ScoobySocial</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                ☰
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="perfil.html">Perfil</a></li>
                    <li class="nav-item"><a class="nav-link" href="configuracao.html">Configuração</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                </ul>

                <!-- botão dark mode -->
                <button onclick="toggleTheme()" class="btn btn-light ms-3">🌙</button>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO -->
    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card p-4 shadow col-md-4">
            <h3 class="text-center mb-3">Cadastro</h3>

            <input type="text" class="form-control mb-3" placeholder="Nome">
            <input type="email" class="form-control mb-3" placeholder="Email">
            <input type="password" class="form-control mb-3" placeholder="Senha">

            <button class="btn btn-success w-100 mb-2">Cadastrar</button>

            <p class="text-center">
                Já tem conta? <a href="login.html">Entrar</a>
            </p>
        </div>

    </div>

    <!-- SCRIPT -->
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const atual = html.getAttribute("data-bs-theme");

            html.setAttribute("data-bs-theme", atual === "light" ? "dark" : "light");
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
